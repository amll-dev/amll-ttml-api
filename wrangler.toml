name = "amll-ttml-api"
main = "build/worker/shim.mjs"
compatibility_date = "2026-06-19"

[build]
command = "cargo install worker-build && worker-build --release"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
