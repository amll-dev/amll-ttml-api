openapi: 3.2.0
info:
  title: AMLL TTML API
  version: 1.0.0
  description: |
    AMLL TTML API 接口文档。

    **基础信息**
    * **协议**: HTTP/HTTPS
    * **内容类型**: `application/json`
    * **CORS**: 允许跨域 (`Access-Control-Allow-Origin: *`)
servers:
  - url: /
paths:
  /api/v1/lyrics/get:
    get:
      summary: 获取歌词
      description: |
        通过唯一的 ID 获取一首歌曲的元数据及其完整的 TTML 歌词。至少需要提供以下任意一个参数。如果提供多个不同平台的参数，或为同一平台提供多个 ID，将使用交集 (AND) 进行匹配。返回匹配结果中最新的一条。

        `filename` 为独占参数，传入时将忽略其他所有 ID 参数，直接按文件名精确匹配。

        如果使用其他平台 ID 获取歌词，将会返回指定 ID 最新的歌词，如果你需要获取旧歌词，请使用 `filename` 精确匹配。
      parameters:
        - name: filename
          in: query
          required: false
          schema:
            type: string
          description: 歌词文件名，精确匹配。必须以 `.ttml` 结尾。传入时忽略其他 ID 参数。
        - name: ncmMusicId
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: 网易云音乐 ID
        - name: qqMusicId
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: QQ 音乐 ID
        - name: appleMusicId
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: Apple Music ID
        - name: spotifyId
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: Spotify ID
        - name: isrc
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: ISRC 编码
        - name: format
          in: query
          required: false
          schema:
            type: string
            default: ttml
            enum:
              - ttml
          description: 保留字段，默认为 ttml。当前仅支持 ttml。
      responses:
        "200":
          description: 成功返回歌曲元数据和歌词
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetResponse"
        "400":
          description: 参数验证失败（未传入任何有效 ID 参数、不支持的 format 值等）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 未匹配到任何歌词
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: 网关错误（未能从 GitHub 获取到 TTML 原文 / 索引数据库更新失败）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/lyrics/search:
    get:
      summary: 搜索歌词
      description: |
        在词库中搜索符合条件的歌词。为了保证接口性能，搜索结果中不包含完整歌词，只返回基础信息。至少需要提供一个参数。如果同时传入 q 和其他参数，则忽略 q，优先使用其他参数。多个非 q 参数之间为 AND 交集关系。空字符串参数视为未传入。
      parameters:
        # 全局搜索
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: 模糊搜索，可组合歌曲名、歌手名和专辑名传入
        # 曲名匹配
        - name: musicName
          in: query
          required: false
          schema:
            type: string
          description: 限定匹配曲名（模糊包含）
        # 歌手匹配
        - name: artistName
          in: query
          required: false
          schema:
            type: string
          description: 限定匹配歌手名（模糊包含）
        # 专辑匹配
        - name: albumName
          in: query
          required: false
          schema:
            type: string
          description: 限定匹配专辑名（模糊包含）
        # 歌词作者 GitHub ID 匹配
        - name: authorId
          in: query
          required: false
          schema:
            type: string
          description: 歌词作者 GitHub ID（严格全等）
        # 歌词作者 GitHub 用户名匹配
        - name: authorUsername
          in: query
          required: false
          schema:
            type: string
          description: 歌词作者 GitHub 用户名（严格全等）
      responses:
        "200":
          description: 成功（最多返回前 50 条记录，无匹配时返回空列表）
          content:
            application/json:
              schema:
                type: array
                maxItems: 50
                items:
                  $ref: "#/components/schemas/SearchResponse"
        "400":
          description: 参数验证失败（未传入任何有效请求参数）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: 内部错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    SongItem:
      type: object
      required:
        - filename
        - musicNames
        - artistNames
        - albumNames
        - ncmMusicIds
        - qqMusicIds
        - appleMusicIds
        - spotifyIds
        - isrcs
        - authorIds
        - authorUsernames
      properties:
        filename:
          type: string
          description: 歌词文件名
          example: "1768754400682-250306205-r6IrpmBd.ttml"
        musicNames:
          type: array
          items:
            type: string
          description: 歌曲名列表
          example: ["ME!", "ME! (feat. Brendon Urie of Panic! At The Disco)"]
        artistNames:
          type: array
          items:
            type: string
          description: 歌手名列表
          example: ["Brendon Urie", "Taylor Swift"]
        albumNames:
          type: array
          items:
            type: string
          description: 专辑名列表
          example: ["Lover"]
        ncmMusicIds:
          type: array
          items:
            type: string
          description: 网易云音乐平台 ID 列表
          example: ["1361348080", "1382781549"]
        qqMusicIds:
          type: array
          items:
            type: string
          description: QQ 音乐平台 ID 列表
          example: ["0032UZe62rZk9K"]
        appleMusicIds:
          type: array
          items:
            type: string
          description: Apple Music 平台 ID 列表
          example: ["1468058706"]
        spotifyIds:
          type: array
          items:
            type: string
          description: Spotify 平台 ID 列表
          example: ["2Rk4JlNc2TPmZe2af99d45"]
        isrcs:
          type: array
          items:
            type: string
          description: ISRC 国际标准音像制品编码列表
          example: ["USUG11901494"]
        authorIds:
          type: array
          items:
            type: string
          description: TTML 歌词贡献者的 GitHub ID 列表
          example: ["108002475", "250306205"]
        authorUsernames:
          type: array
          items:
            type: string
          description: TTML 歌词贡献者的 GitHub 用户名列表
          example: ["SteamFinder", "apoint123"]
        lyrics:
          type: string
          nullable: true
          description: TTML 格式的歌词内容。仅在 `get` 接口中返回。
          example: "ttml字符串..."
        format:
          type: string
          nullable: true
          description: 保留字段。歌词格式标识。仅在 `get` 接口中返回，当前固定为 ttml。
          example: "ttml"

    GetResponse:
      type: object
      required:
        - status
        - data
      properties:
        status:
          type: integer
          example: 200
        data:
          $ref: "#/components/schemas/SongItem"

    SearchResponse:
      type: object
      required:
        - status
        - data
      properties:
        status:
          type: integer
          example: 200
        data:
          type: object
          required:
            - items
          properties:
            items:
              type: array
              maxItems: 50
              items:
                $ref: "#/components/schemas/SongItem"

    ErrorResponse:
      type: object
      required:
        - status
        - error
        - message
      properties:
        status:
          type: integer
          description: HTTP 状态码
          example: 400
        error:
          type: string
          description: 错误分类
          example: "Bad Request"
        message:
          type: string
          description: 详细的错误原因说明
          example: "Missing valid search parameters."
